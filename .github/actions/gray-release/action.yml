name: 'Gray Release'
description: '灰度发布控制 Action'
author: 'devops-actions'

inputs:
  percentage:
    description: '灰度流量百分比 (0-100)'
    required: true
    default: '10'
  image-tag:
    description: '要部署的镜像标签'
    required: true
  github-token:
    description: 'GitHub Token'
    required: true
  environment:
    description: '部署环境'
    required: false
    default: 'production'

outputs:
  release-id:
    description: '发布 ID'
  status:
    description: '发布状态'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'truck'
  color: 'blue'
