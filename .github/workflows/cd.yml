name: CD Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy-type:
        description: '部署类型'
        required: true
        default: 'gray'
        type: choice
        options:
          - gray
          - full
          - ssh

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=sha,prefix={{branch}}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  ssh-deploy-docker:
    name: SSH Deploy with Docker
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.deploy-type == 'ssh'
    steps:
      - uses: actions/checkout@v4

      - name: Execute SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: 22
          script: |
            echo "🚀 开始部署..."

            # 拉取新镜像
            docker pull ghcr.io/${{ github.repository }}:${{ github.sha }} || true

            # 停止旧容器
            docker stop devops-actions 2>/dev/null || true
            docker rm devops-actions 2>/dev/null || true

            # 启动新容器
            docker run -d \
              --name devops-actions \
              --restart=always \
              -p 80:80 \
              ghcr.io/${{ github.repository }}:${{ github.sha }}

            # 验证
            sleep 3
            docker ps --filter name=devops-actions

            echo "✅ 部署完成！"

  gray-release:
    name: Gray Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.deploy-type == 'gray' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Gray Release Simulation
        run: |
          echo "🚀 执行灰度发布 (10% 流量)"
          echo "镜像: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "✅ 灰度发布完成"

  full-release:
    name: Full Release
    runs-on: ubuntu-latest
    needs: gray-release
    if: github.event.inputs.deploy-type == 'full'
    steps:
      - name: Full Release Simulation
        run: |
          echo "🚀 执行全量发布 (100% 流量)"
          echo "✅ 全量发布完成"
